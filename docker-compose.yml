services:
  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-kioschat}
    ports:
      - "5432:5432"
    volumes:
      - kios_db_data:/var/lib/postgresql/data

volumes:
  kios_db_data:
